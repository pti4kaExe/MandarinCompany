<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио - Мандарин | Наши работы</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <style>
        .portfolio-header {
            background: linear-gradient(135deg, #FF8C42, #FF6B35);
            color: white;
            padding: 4rem 5%;
            text-align: center;
        }
        
        .portfolio-header h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        .portfolio-filters {
            padding: 2rem 5%;
            text-align: center;
        }
        
        .portfolio-grid-page {
            padding: 2rem 5%;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .portfolio-item-large {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .portfolio-item-large:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }
        
        .portfolio-img-large {
            height: 300px;
            background: linear-gradient(135deg, #FFE5D9, #FFD4C4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            position: relative;
            overflow: hidden;
        }
        
        .portfolio-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .portfolio-item-large:hover .portfolio-overlay {
            opacity: 1;
        }
        
        .portfolio-info-large {
            padding: 1.5rem;
        }
        
        .portfolio-info-large h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }
        
        .portfolio-info-large p {
            color: #666;
        }
        
        .portfolio-info-large .date {
            font-size: 0.85rem;
            color: #FF8C42;
            margin-top: 0.5rem;
        }
        
        /* Модальное окно просмотра работы */
        .work-modal .modal-content {
            max-width: 800px;
        }
        
        .work-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }
        
        .work-gallery-item {
            background: #f0f0f0;
            border-radius: 12px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
    </style>
</head>
<body>
    <div id="header"></div>

    <div class="portfolio-header">
        <h1>Наши работы</h1>
        <p>Более 5000 выполненных проектов в Феодосии и Крыму</p>
    </div>

    <div class="portfolio-filters">
        <div class="filters" id="portfolioFilters">
            <button class="filter-btn active" data-filter="all">Все работы</button>
            <button class="filter-btn" data-filter="windows">Окна</button>
            <button class="filter-btn" data-filter="doors">Двери</button>
            <button class="filter-btn" data-filter="balconies">Балконы</button>
        </div>
    </div>

    <div class="portfolio-grid-page" id="portfolioGridPage"></div>

    <div id="footer"></div>

    <!-- Модальное окно просмотра работы -->
    <div id="workModal" class="modal">
        <div class="modal-content work-modal">
            <div class="modal-header">
                <h3 id="workModalTitle"></h3>
                <span class="close-modal" onclick="closeWorkModal()">&times;</span>
            </div>
            <div id="workModalContent"></div>
        </div>
    </div>

    <div id="cartModal" class="modal"></div>
    <div id="authModal" class="modal"></div>
    <div id="chatCalculatorModal" class="modal"></div>
    <div class="chat-calculator-btn" id="chatCalculatorBtn">
        <i class="fas fa-calculator"></i>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/calculator.js"></script>
    <script src="../js/animations.js"></script>
    <script>
        const portfolioWorks = [
            { id: 1, title: "Остекление лоджии", category: "balconies", icon: "🏠", desc: "ул. Земская, Феодосия", date: "Январь 2024", address: "ул. Земская, 15", client: "Семья Ивановых", gallery: ["🏠", "🪟", "🏢"] },
            { id: 2, title: "Входная дверь Престиж", category: "doors", icon: "🚪", desc: "пгт. Коктебель", date: "Февраль 2024", address: "ул. Морская, 7", client: "Петр Сидоренко", gallery: ["🚪", "🔑", "🏠"] },
            { id: 3, title: "Пластиковые окна", category: "windows", icon: "🪟", desc: "ЖК «Мандарин»", date: "Март 2024", address: "ул. Советская, 3", client: "ООО «Мандарин»", gallery: ["🪟", "🏢", "🪟"] },
            { id: 4, title: "Секционные ворота", category: "doors", icon: "🚘", desc: "Автосервис, Феодосия", date: "Апрель 2024", address: "ул. Промышленная, 12", client: "Автосервис «Скорость»", gallery: ["🚘", "🔧", "🏭"] },
            { id: 5, title: "Остекление балкона", category: "balconies", icon: "🏠", desc: "ул. Нахимова, Феодосия", date: "Май 2024", address: "ул. Нахимова, 8", client: "Елена Васильева", gallery: ["🏠", "🌊", "🪟"] },
            { id: 6, title: "Деревянные окна", category: "windows", icon: "🌳", desc: "пгт. Приморский", date: "Июнь 2024", address: "ул. Лесная, 3", client: "Алексей Морозов", gallery: ["🌳", "🪟", "🏡"] }
        ];
        
        function renderPortfolioPage(filter = "all") {
            const grid = document.getElementById("portfolioGridPage");
            if (!grid) return;
            
            const filtered = filter === "all" ? portfolioWorks : portfolioWorks.filter(w => w.category === filter);
            
            grid.innerHTML = filtered.map(work => `
                <div class="portfolio-item-large" onclick="openWorkModal(${work.id})">
                    <div class="portfolio-img-large">
                        ${work.icon}
                        <div class="portfolio-overlay">
                            <i class="fas fa-search-plus" style="color: white; font-size: 2rem;"></i>
                        </div>
                    </div>
                    <div class="portfolio-info-large">
                        <h3>${work.title}</h3>
                        <p>${work.desc}</p>
                        <div class="date">📅 ${work.date}</div>
                    </div>
                </div>
            `).join("");
        }
        
        function openWorkModal(workId) {
            const work = portfolioWorks.find(w => w.id === workId);
            if (!work) return;
            
            document.getElementById('workModalTitle').textContent = work.title;
            document.getElementById('workModalContent').innerHTML = `
                <div class="work-gallery">
                    ${work.gallery.map(img => `<div class="work-gallery-item">${img}</div>`).join('')}
                </div>
                <div style="margin-top: 1rem;">
                    <p><strong>📍 Адрес:</strong> ${work.address}</p>
                    <p><strong>👤 Клиент:</strong> ${work.client}</p>
                    <p><strong>📅 Дата выполнения:</strong> ${work.date}</p>
                    <p><strong>📝 Описание:</strong> ${work.desc}</p>
                </div>
                <button class="btn btn-orange" style="width:100%; margin-top:1rem;" onclick="window.location.href='../index.html#request'">
                    Заказать такой же
                </button>
            `;
            
            document.getElementById('workModal').classList.add('active');
        }
        
        function closeWorkModal() {
            document.getElementById('workModal').classList.remove('active');
        }
        
        function renderHeader() {
            const headerHtml = `
                <header>
                    <div class="header-container">
                        <div class="logo">
                            <h1><i class="fas fa-tangerine"></i> МАНДАРИН</h1>
                            <p>Окна · Двери · Балконы · Роллеты · Ворота · Шторы · Кондиционеры</p>
                        </div>
                        <nav>
                            <ul>
                                <li><a href="../index.html">Главная</a></li>
                                <li><a href="catalog.html">Каталог</a></li>
                                <li><a href="services.html">Услуги</a></li>
                                <li><a href="portfolio.html" class="active">Портфолио</a></li>
                                <li><a href="about.html">О компании</a></li>
                                <li><a href="blog.html">Блог</a></li>
                                <li><a href="contacts.html">Контакты</a></li>
                            </ul>
                        </nav>
                        <div class="user-actions">
                            <div class="cart-icon" id="cartIcon">
                                <i class="fas fa-shopping-cart"></i>
                                <span class="cart-count" id="cartCount">0</span>
                            </div>
                            <div class="user-icon" id="userIcon">
                                <i class="fas fa-user"></i>
                            </div>
                        </div>
                    </div>
                </header>
            `;
            document.getElementById('header').innerHTML = headerHtml;
        }
        
        function renderFooter() {
            const footerHtml = `
                <footer>
                    <div class="footer-content">
                        <div class="footer-col">
                            <h4>ООО «Мандарин»</h4>
                            <p>Надёжные окна и двери от производителя в Феодосии и Крыму</p>
                        </div>
                        <div class="footer-col">
                            <h4>Контакты</h4>
                            <p>ул. Советская 3, Феодосия<br>+7 (978) 123-45-67<br>info@mandarin.ru</p>
                        </div>
                        <div class="footer-col">
                            <h4>Мы в соцсетях</h4>
                            <div class="social-links">
                                <a href="https://wa.me/79781234567" target="_blank"><i class="fab fa-whatsapp"></i></a>
                                <a href="https://t.me/mandarin_feo" target="_blank"><i class="fab fa-telegram"></i></a>
                                <a href="#" target="_blank"><i class="fab fa-vk"></i></a>
                            </div>
                        </div>
                        <div class="footer-col">
                            <h4>Режим работы</h4>
                            <p>Пн-Пт: 9:00–19:00<br>Сб-Вс: 10:00–16:00</p>
                        </div>
                    </div>
                    <div class="copyright">
                        © 2025 ООО «Мандарин». Бесплатный замер, гарантия 5 лет, установка за 1 день.
                    </div>
                </footer>
            `;
            document.getElementById('footer').innerHTML = footerHtml;
        }
        
        async function init() {
            renderHeader();
            renderFooter();
            renderPortfolioPage();
            await loadCartModal();
            await loadAuthModal();
            await loadCalculatorModal();
            updateCartDisplay();
            updateAuthUI();
            
            document.getElementById('cartIcon')?.addEventListener('click', openCartModal);
            document.getElementById('userIcon')?.addEventListener('click', openAuthModal);
            document.getElementById('chatCalculatorBtn')?.addEventListener('click', openChatCalculator);
            
            document.querySelectorAll('#portfolioFilters .filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('#portfolioFilters .filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    renderPortfolioPage(this.dataset.filter);
                });
            });
        }
        
        window.openWorkModal = openWorkModal;
        window.closeWorkModal = closeWorkModal;
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
