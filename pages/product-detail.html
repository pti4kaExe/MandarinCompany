<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Товар - Мандарин</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <style>
        .product-detail {
            padding: 4rem 5%;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .product-detail-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            background: white;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        
        .product-gallery {
            position: sticky;
            top: 100px;
        }
        
        .main-image {
            width: 100%;
            height: 400px;
            background: linear-gradient(135deg, #FFE5D9, #FFD4C4);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8rem;
            margin-bottom: 1rem;
        }
        
        .thumbnail-images {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .thumbnail {
            width: 80px;
            height: 80px;
            background: #f0f0f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        
        .thumbnail:hover, .thumbnail.active {
            border: 2px solid #FF8C42;
            transform: scale(1.05);
        }
        
        .product-info h1 {
            font-size: 2rem;
            color: #1A2A3A;
            margin-bottom: 1rem;
        }
        
        .product-price {
            font-size: 2rem;
            color: #FF8C42;
            font-weight: bold;
            margin: 1rem 0;
        }
        
        .product-description {
            color: #666;
            line-height: 1.6;
            margin: 1rem 0;
        }
        
        .product-characteristics {
            background: #F8F9FA;
            padding: 1.5rem;
            border-radius: 16px;
            margin: 1.5rem 0;
        }
        
        .characteristic-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #e9ecef;
        }
        
        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        
        .quantity-btn {
            width: 40px;
            height: 40px;
            background: #e9ecef;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        
        .quantity-btn:hover {
            background: #FF8C42;
            color: white;
        }
        
        .quantity-input {
            width: 80px;
            text-align: center;
            font-size: 1.2rem;
        }
        
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .action-buttons .btn {
            flex: 1;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .product-detail-container {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            
            .product-gallery {
                position: static;
            }
        }
    </style>
</head>
<body>
    <div id="header"></div>

    <div class="product-detail" id="productDetail">
        <div class="product-detail-container" id="productContainer">
            <!-- Контент будет загружен через JS -->
        </div>
    </div>

    <div id="footer"></div>

    <div id="cartModal" class="modal"></div>
    <div id="authModal" class="modal"></div>
    <div id="chatCalculatorModal" class="modal"></div>
    <div class="chat-calculator-btn" id="chatCalculatorBtn">
        <i class="fas fa-calculator"></i>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/calculator.js"></script>
    <script src="../js/animations.js"></script>
    <script>
        // Получаем ID товара из URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));
        
        let currentProduct = null;
        let quantity = 1;
        
        function loadProduct() {
            // Ищем товар в каталоге
            currentProduct = catalogItems.find(item => item.id === productId);
            
            if (!currentProduct) {
                window.location.href = 'catalog.html';
                return;
            }
            
            renderProduct();
        }
        
        function renderProduct() {
            const container = document.getElementById('productContainer');
            if (!container) return;
            
            container.innerHTML = `
                <div class="product-gallery">
                    <div class="main-image">${currentProduct.icon}</div>
                    <div class="thumbnail-images">
                        <div class="thumbnail">${currentProduct.icon}</div>
                        <div class="thumbnail">🪟</div>
                        <div class="thumbnail">🏠</div>
                    </div>
                </div>
                <div class="product-info">
                    <h1>${currentProduct.name}</h1>
                    <div class="product-price">${currentProduct.priceText}</div>
                    <div class="product-description">
                        ${currentProduct.desc || 'Высококачественное изделие от производителя. Гарантия качества и надежности.'}
                    </div>
                    <div class="product-characteristics">
                        <h3>Характеристики:</h3>
                        <div class="characteristic-item">
                            <span>Материал:</span>
                            <span>${currentProduct.material || 'ПВХ'}</span>
                        </div>
                        <div class="characteristic-item">
                            <span>Производитель:</span>
                            <span>ООО «Мандарин»</span>
                        </div>
                        <div class="characteristic-item">
                            <span>Гарантия:</span>
                            <span>5 лет</span>
                        </div>
                        <div class="characteristic-item">
                            <span>Срок установки:</span>
                            <span>1 день</span>
                        </div>
                    </div>
                    <div class="quantity-selector">
                        <button class="quantity-btn" onclick="decreaseQuantity()">-</button>
                        <input type="number" class="quantity-input" id="quantity" value="${quantity}" min="1" readonly>
                        <button class="quantity-btn" onclick="increaseQuantity()">+</button>
                    </div>
                    <div class="action-buttons">
                        <button class="btn btn-orange" onclick="addToCartWithQuantity()">
                            🍊 Добавить в корзину
                        </button>
                        <button class="btn" onclick="goToOrderFormWithProduct()">
                            Заказать
                        </button>
                    </div>
                </div>
            `;
        }
        
        function decreaseQuantity() {
            if (quantity > 1) {
                quantity--;
                document.getElementById('quantity').value = quantity;
            }
        }
        
        function increaseQuantity() {
            quantity++;
            document.getElementById('quantity').value = quantity;
        }
        
        function addToCartWithQuantity() {
            const itemToAdd = { ...currentProduct, quantity: quantity };
            const existing = cart.find(cartItem => cartItem.id === itemToAdd.id);
            if (existing) {
                existing.quantity += quantity;
            } else {
                cart.push(itemToAdd);
            }
            updateCartDisplay();
            showNotification(`🍊 ${currentProduct.name} добавлен в корзину в количестве ${quantity} шт.`);
        }
        
        function goToOrderFormWithProduct() {
            window.location.href = '../index.html#request';
            if (currentUser) {
                localStorage.setItem('orderProduct', JSON.stringify({
                    name: currentProduct.name,
                    quantity: quantity
                }));
            }
        }
        
        function renderHeader() {
            const headerHtml = `
                <header>
                    <div class="header-container">
                        <div class="logo">
                            <h1><i class="fas fa-tangerine"></i> МАНДАРИН</h1>
                            <p>Окна · Двери · Балконы · Роллеты · Ворота · Шторы · Кондиционеры</p>
                        </div>
                        <nav>
                            <ul>
                                <li><a href="../index.html">Главная</a></li>
                                <li><a href="catalog.html">Каталог</a></li>
                                <li><a href="services.html">Услуги</a></li>
                                <li><a href="portfolio.html">Портфолио</a></li>
                                <li><a href="about.html">О компании</a></li>
                                <li><a href="blog.html">Блог</a></li>
                                <li><a href="contacts.html">Контакты</a></li>
                            </ul>
                        </nav>
                        <div class="user-actions">
                            <div class="cart-icon" id="cartIcon">
                                <i class="fas fa-shopping-cart"></i>
                                <span class="cart-count" id="cartCount">0</span>
                            </div>
                            <div class="user-icon" id="userIcon">
                                <i class="fas fa-user"></i>
                            </div>
                        </div>
                    </div>
                </header>
            `;
            document.getElementById('header').innerHTML = headerHtml;
        }
        
        function renderFooter() {
            const footerHtml = `
                <footer>
                    <div class="footer-content">
                        <div class="footer-col">
                            <h4>ООО «Мандарин»</h4>
                            <p>Надёжные окна и двери от производителя в Феодосии и Крыму</p>
                        </div>
                        <div class="footer-col">
                            <h4>Контакты</h4>
                            <p>ул. Советская 3, Феодосия<br>+7 (978) 123-45-67<br>info@mandarin.ru</p>
                        </div>
                        <div class="footer-col">
                            <h4>Мы в соцсетях</h4>
                            <div class="social-links">
                                <a href="https://wa.me/79781234567" target="_blank"><i class="fab fa-whatsapp"></i></a>
                                <a href="https://t.me/mandarin_feo" target="_blank"><i class="fab fa-telegram"></i></a>
                                <a href="#" target="_blank"><i class="fab fa-vk"></i></a>
                            </div>
                        </div>
                        <div class="footer-col">
                            <h4>Режим работы</h4>
                            <p>Пн-Пт: 9:00–19:00<br>Сб-Вс: 10:00–16:00</p>
                        </div>
                    </div>
                    <div class="copyright">
                        © 2025 ООО «Мандарин». Бесплатный замер, гарантия 5 лет, установка за 1 день.
                    </div>
                </footer>
            `;
            document.getElementById('footer').innerHTML = footerHtml;
        }
        
        async function init() {
            renderHeader();
            renderFooter();
            loadProduct();
            await loadCartModal();
            await loadAuthModal();
            await loadCalculatorModal();
            updateCartDisplay();
            updateAuthUI();
            
            document.getElementById('cartIcon')?.addEventListener('click', openCartModal);
            document.getElementById('userIcon')?.addEventListener('click', openAuthModal);
            document.getElementById('chatCalculatorBtn')?.addEventListener('click', openChatCalculator);
        }
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
